<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PDF 工具箱 v5 Enterprise Review Edition</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
:root{--bg:#f4f7fb;--card:#fff;--line:#dfe6ef;--text:#0f233d;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#f59e0b;--soft:#f8fafc}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"Microsoft JhengHei",system-ui,sans-serif;color:var(--text)}
.wrap{max-width:1180px;margin:0 auto;padding:28px}h1{margin:0 0 6px;font-size:34px;letter-spacing:.5px}.sub{margin:0 0 22px;color:var(--muted)}
.grid{display:grid;grid-template-columns:430px 1fr;gap:20px;align-items:start}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 22px rgba(15,35,61,.06);overflow:hidden}.hd{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.hd h2{margin:0;font-size:20px}.bd{padding:22px}
.drop{border:2px dashed #c8d6ea;border-radius:18px;background:#f8fbff;min-height:180px;display:flex;align-items:center;justify-content:center;text-align:center;padding:22px;cursor:pointer}.drop:hover{border-color:#7aa7ff}.icon{font-size:58px}.fileName{font-weight:800;margin-top:10px;word-break:break-all}.meta{color:var(--muted);font-size:14px;margin-top:6px}.hidden{display:none!important}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}.stat{border:1px solid var(--line);border-radius:16px;background:var(--soft);padding:16px;text-align:center}.num{font-size:30px;font-weight:900}.lab{color:var(--muted);font-size:13px}.bar{height:10px;background:#dbeafe;border-radius:999px;overflow:hidden;margin:14px 0}.bar>i{display:block;width:0;height:100%;background:var(--blue);transition:.25s}
.btn{width:100%;border:0;border-radius:14px;padding:15px 18px;font-size:18px;font-weight:900;cursor:pointer;margin-top:12px}.primary{background:var(--blue);color:#fff}.danger{background:#fee2e2;color:#991b1b}.success{background:#dcfce7;color:#166534}.gray{background:#eef2f7;color:#0f233d}.btn:disabled{opacity:.45;cursor:not-allowed}.small{border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;background:#eef2f7;color:#0f233d}
.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:14px;padding:12px 14px;font-size:14px;line-height:1.6;margin-top:14px}.ok{background:#ecfdf5;border-color:#bbf7d0;color:#166534}.err{background:#fef2f2;border-color:#fecaca;color:#991b1b}.info{background:#eff6ff;border-color:#bfdbfe;color:#1e40af}
.reviewLayout{display:grid;grid-template-columns:310px 1fr;min-height:620px}.listPane{border-right:1px solid var(--line);background:#fbfdff}.toolbar{padding:14px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:8px}.pageList{padding:14px;max-height:640px;overflow:auto}.empty{padding:30px 18px;text-align:center;color:var(--muted);line-height:1.7}.item{border:1px solid var(--line);border-radius:14px;background:#fff;margin-bottom:10px;padding:12px;display:grid;grid-template-columns:28px 1fr;gap:8px;cursor:pointer}.item.active{outline:2px solid #93c5fd;border-color:#93c5fd}.item.blank{background:#fff7ed;border-color:#fed7aa}.item .title{font-weight:900}.item .desc{font-size:13px;color:var(--muted);margin-top:4px}.score{font-size:12px;color:#92400e;margin-top:4px}.previewPane{padding:18px;background:#eef3f8}.previewTitle{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.previewTitle b{font-size:20px}.previewBox{background:#dbe3ee;border:1px solid #cbd5e1;border-radius:16px;min-height:560px;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:18px}.previewBox canvas{background:#fff;box-shadow:0 12px 28px rgba(15,35,61,.18);max-width:100%;height:auto}.hint{color:var(--muted);line-height:1.7}.footerOps{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.debug{font-family:ui-monospace,Consolas,monospace;background:#0f172a;color:#dbeafe;border-radius:14px;padding:12px;max-height:170px;overflow:auto;font-size:12px;white-space:pre-wrap;margin-top:14px}
@media(max-width:900px){.grid,.reviewLayout{grid-template-columns:1fr}.listPane{border-right:0;border-bottom:1px solid var(--line)}.wrap{padding:18px}}
</style>
</head>
<body>
<div class="wrap">
  <h1>PDF 工具箱</h1>
  <p class="sub">v5 Enterprise Review Edition｜自動偵測後先人工確認，避免誤刪重要頁面。</p>
  <div class="grid">
    <section class="card">
      <div class="hd"><h2>1. 選擇 PDF</h2><button class="small" id="clearBtn">清除</button></div>
      <div class="bd">
        <input id="fileInput" class="hidden" type="file" accept="application/pdf">
        <div id="drop" class="drop">
          <div><div class="icon">📄</div><div class="fileName">點我選擇 PDF</div><div class="meta">檔案不會上傳外網，於瀏覽器本機處理。</div></div>
        </div>
        <div class="stats">
          <div class="stat"><div class="num" id="pageCount">0</div><div class="lab">總頁數</div></div>
          <div class="stat"><div class="num" id="suspectCount">0</div><div class="lab">疑似空白</div></div>
          <div class="stat"><div class="num" id="checkedCount">0</div><div class="lab">勾選刪除</div></div>
        </div>
        <div class="bar"><i id="progress"></i></div>
        <div id="msg" class="notice info">請先上傳 PDF，再按「偵測疑似空白頁」。</div>
        <button class="btn primary" id="detectBtn" disabled>① 偵測疑似空白頁</button>
        <button class="btn danger" id="deleteBtn" disabled>② 刪除勾選頁面</button>
        <button class="btn success" id="downloadBtn" disabled>③ 下載目前 PDF</button>
        <div class="footerOps">
          <button class="small" id="extractBtn" disabled>只保留未勾選頁</button>
          <button class="small" id="toggleDebugBtn">顯示偵錯資訊</button>
        </div>
        <div id="debug" class="debug hidden"></div>
      </div>
    </section>

    <section class="card">
      <div class="hd"><h2>2. 人工確認疑似頁面</h2><span class="meta">點頁碼看大圖，勾選才會刪除</span></div>
      <div class="reviewLayout">
        <div class="listPane">
          <div class="toolbar">
            <button class="small" id="selectAllSuspects">全選疑似頁</button>
            <button class="small" id="clearSelection">取消勾選</button>
          </div>
          <div id="pageList" class="pageList"><div class="empty">尚未偵測。偵測後只會列出「疑似空白頁」，不會顯示全部頁面。</div></div>
        </div>
        <div class="previewPane">
          <div class="previewTitle"><b id="previewTitle">頁面預覽</b><span class="meta" id="previewMeta">尚未選擇頁面</span></div>
          <div id="previewBox" class="previewBox"><div class="hint">偵測完成後，點左側疑似頁面即可查看大圖。<br>若系統誤判，取消勾選即可保留該頁。</div></div>
        </div>
      </div>
    </section>
  </div>
</div>
<script>
(function(){
'use strict';
const $=id=>document.getElementById(id);
const logLines=[]; const log=(s)=>{logLines.push(`[${new Date().toLocaleTimeString()}] ${s}`); $('debug').textContent=logLines.join('\n');};
let file=null, originalBytes=null, currentBytes=null, pdfDoc=null, suspectPages=[], selected=new Set(), activePage=null;
const els=['fileInput','drop','clearBtn','pageCount','suspectCount','checkedCount','progress','msg','detectBtn','deleteBtn','downloadBtn','extractBtn','toggleDebugBtn','debug','pageList','previewBox','previewTitle','previewMeta','selectAllSuspects','clearSelection'].reduce((a,id)=>(a[id]=$(id),a),{});
function setMsg(text,type='info'){els.msg.className='notice '+type; els.msg.textContent=text;}
function setProgress(p){els.progress.style.width=Math.max(0,Math.min(100,p))+'%';}
function fmt(bytes){return bytes<1024*1024?(bytes/1024).toFixed(1)+' KB':(bytes/1024/1024).toFixed(2)+' MB';}
function updateStats(){els.pageCount.textContent=pdfDoc?pdfDoc.numPages:0; els.suspectCount.textContent=suspectPages.length; els.checkedCount.textContent=selected.size; els.deleteBtn.disabled=selected.size===0; els.extractBtn.disabled=!pdfDoc||selected.size===0; els.downloadBtn.disabled=!currentBytes;}
function ensureLibs(){ if(!window.pdfjsLib) throw new Error('PDF.js 載入失敗，可能是公司網路擋住 CDN。'); if(!window.PDFLib) throw new Error('pdf-lib 載入失敗，可能是公司網路擋住 CDN。'); pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }
async function loadFile(f){
 try{ ensureLibs(); file=f; originalBytes=await f.arrayBuffer(); currentBytes=originalBytes.slice(0); pdfDoc=await pdfjsLib.getDocument({data:originalBytes.slice(0)}).promise; suspectPages=[]; selected.clear(); activePage=null; setProgress(100); setMsg(`載入完成：${f.name}（${fmt(f.size)}），共 ${pdfDoc.numPages} 頁。請按偵測。`,'ok'); els.detectBtn.disabled=false; renderList(); clearPreview(); updateStats(); log(`PDF loaded: ${f.name}, pages=${pdfDoc.numPages}, size=${fmt(f.size)}`); }
 catch(e){ console.error(e); setMsg('載入失敗：'+e.message,'err'); log('Load error: '+e.message); }
}
async function renderPageCanvas(pageNo, scale=1.35){
 const page=await pdfDoc.getPage(pageNo); const viewport=page.getViewport({scale}); const canvas=document.createElement('canvas'); const ctx=canvas.getContext('2d',{willReadFrequently:true}); canvas.width=Math.floor(viewport.width); canvas.height=Math.floor(viewport.height); await page.render({canvasContext:ctx,viewport}).promise; return canvas;
}
async function detect(){
 if(!pdfDoc)return; suspectPages=[]; selected.clear(); setMsg('偵測中，請稍候...','info'); setProgress(0); renderList(); clearPreview(); log('Start detecting blank pages');
 for(let i=1;i<=pdfDoc.numPages;i++){
   try{
    const canvas=await renderPageCanvas(i,0.42); const ctx=canvas.getContext('2d',{willReadFrequently:true}); const img=ctx.getImageData(0,0,canvas.width,canvas.height).data; let nonWhite=0,total=canvas.width*canvas.height;
    for(let p=0;p<img.length;p+=4){ const r=img[p],g=img[p+1],b=img[p+2],a=img[p+3]; if(a>20 && !(r>245&&g>245&&b>245)) nonWhite++; }
    const ratio=nonWhite/total; const suspicious=ratio<0.006; // less than 0.6% non-white pixels
    if(suspicious){suspectPages.push({page:i,ratio}); selected.add(i);} log(`page ${i}: nonWhiteRatio=${(ratio*100).toFixed(3)}% ${suspicious?'SUSPECT':''}`);
   }catch(e){ log(`page ${i}: detect error ${e.message}`); }
   setProgress((i/pdfDoc.numPages)*100); updateStats();
 }
 renderList(); updateStats();
 if(suspectPages.length){ setMsg(`偵測完成：找到 ${suspectPages.length} 頁疑似空白頁。請逐頁預覽確認，勾選的頁面才會刪除。`,'ok'); showPreview(suspectPages[0].page); }
 else setMsg('偵測完成：沒有找到疑似空白頁。','ok');
}
function renderList(){
 const box=els.pageList; box.innerHTML='';
 if(!suspectPages.length){ box.innerHTML='<div class="empty">目前沒有疑似空白頁。<br>若尚未偵測，請先按左側偵測按鈕。</div>'; return; }
 suspectPages.forEach(x=>{ const div=document.createElement('div'); div.className='item blank'+(activePage===x.page?' active':''); div.innerHTML=`<input type="checkbox" ${selected.has(x.page)?'checked':''} aria-label="勾選第${x.page}頁"><div><div class="title">第 ${x.page} 頁</div><div class="desc">系統判斷：疑似空白頁</div><div class="score">內容像素約 ${(x.ratio*100).toFixed(3)}%</div></div>`; div.onclick=(ev)=>{ if(ev.target.tagName==='INPUT'){ if(ev.target.checked)selected.add(x.page); else selected.delete(x.page); updateStats(); return; } showPreview(x.page); }; div.querySelector('input').onchange=(ev)=>{ if(ev.target.checked)selected.add(x.page); else selected.delete(x.page); updateStats(); }; box.appendChild(div); });
}
function clearPreview(){els.previewTitle.textContent='頁面預覽'; els.previewMeta.textContent='尚未選擇頁面'; els.previewBox.innerHTML='<div class="hint">偵測完成後，點左側疑似頁面即可查看大圖。<br>若系統誤判，取消勾選即可保留該頁。</div>';}
async function showPreview(pageNo){
 try{ activePage=pageNo; renderList(); els.previewTitle.textContent=`第 ${pageNo} 頁預覽`; els.previewMeta.textContent='產生大圖中...'; els.previewBox.innerHTML=''; const canvas=await renderPageCanvas(pageNo,1.45); els.previewBox.appendChild(canvas); els.previewMeta.textContent=`${canvas.width} × ${canvas.height}`; log(`preview page ${pageNo}: ${canvas.width}x${canvas.height}`); }
 catch(e){ els.previewBox.innerHTML='<div class="hint">預覽失敗：'+e.message+'</div>'; els.previewMeta.textContent='預覽失敗'; log('Preview error: '+e.message); }
}
async function exportKeeping(keepPages, filename){
 const src=await PDFLib.PDFDocument.load(currentBytes.slice(0)); const out=await PDFLib.PDFDocument.create(); const copied=await out.copyPages(src, keepPages.map(n=>n-1)); copied.forEach(p=>out.addPage(p)); const bytes=await out.save(); currentBytes=bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset+bytes.byteLength); downloadBytes(currentBytes, filename); pdfDoc=await pdfjsLib.getDocument({data:currentBytes.slice(0)}).promise; suspectPages=[]; selected.clear(); activePage=null; renderList(); clearPreview(); updateStats(); setMsg(`處理完成，已產生 ${filename}。目前 PDF 共 ${pdfDoc.numPages} 頁。`,'ok'); }
function allPages(){return Array.from({length:pdfDoc.numPages},(_,i)=>i+1)}
async function deleteSelected(){ if(!selected.size)return; if(!confirm(`確定刪除 ${selected.size} 頁？\n勾選頁面：${[...selected].sort((a,b)=>a-b).join(', ')}`))return; const keep=allPages().filter(n=>!selected.has(n)); await exportKeeping(keep, makeName('_刪除空白頁.pdf')); }
async function extractUnselected(){ const keep=allPages().filter(n=>!selected.has(n)); await exportKeeping(keep, makeName('_保留版.pdf')); }
function makeName(suffix){ const base=(file?.name||'output.pdf').replace(/\.pdf$/i,''); return base+suffix; }
function downloadBytes(bytes,name){ const blob=new Blob([bytes],{type:'application/pdf'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }
function reset(){ file=null; originalBytes=null; currentBytes=null; pdfDoc=null; suspectPages=[]; selected.clear(); activePage=null; els.fileInput.value=''; els.detectBtn.disabled=true; els.deleteBtn.disabled=true; els.downloadBtn.disabled=true; els.extractBtn.disabled=true; setProgress(0); setMsg('請先上傳 PDF，再按「偵測疑似空白頁」。','info'); renderList(); clearPreview(); updateStats(); log('Reset'); }
els.drop.onclick=()=>els.fileInput.click(); els.fileInput.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0]);};
els.clearBtn.onclick=reset; els.detectBtn.onclick=detect; els.deleteBtn.onclick=deleteSelected; els.extractBtn.onclick=extractUnselected; els.downloadBtn.onclick=()=>currentBytes&&downloadBytes(currentBytes,makeName('_目前版本.pdf'));
els.toggleDebugBtn.onclick=()=>els.debug.classList.toggle('hidden'); els.selectAllSuspects.onclick=()=>{suspectPages.forEach(x=>selected.add(x.page)); renderList(); updateStats();}; els.clearSelection.onclick=()=>{selected.clear(); renderList(); updateStats();};
els.drop.ondragover=e=>{e.preventDefault(); els.drop.style.borderColor='#2563eb';}; els.drop.ondragleave=()=>els.drop.style.borderColor=''; els.drop.ondrop=e=>{e.preventDefault(); els.drop.style.borderColor=''; if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);};
try{ensureLibs(); log('Libraries loaded');}catch(e){setMsg(e.message,'err');log(e.message)}
})();
</script>
</body>
</html>
